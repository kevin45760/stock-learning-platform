<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>📈 學院大廳 - 魔法股市主要看板</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --accent-blue: #38bdf8;
            --up-red: #f43f5e;
            --down-green: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--accent-blue); }
        .logout-btn { color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .logout-btn:hover { color: var(--up-red); }

        .main-container {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
            position: relative;
        }

        .stock-main-panel {
            flex: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 25px;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--accent-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            background: var(--accent-blue);
            color: #0b0f19;
        }

        .stock-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .stock-table th {
            padding: 14px;
            color: #94a3b8;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }
        .stock-table td {
            padding: 16px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1.05rem;
        }
        .stock-row { transition: background 0.2s; }
        .stock-row:hover { background: rgba(255, 255, 255, 0.03); }

        .chat-sidebar {
            width: 320px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.1);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }
        .chat-title { font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
        .msg-line { display: flex; gap: 10px; align-items: flex-start; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: #475569; }
        .msg-bubble {
            background: rgba(15, 23, 42, 0.6); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-color);
            max-width: 80%; font-size: 0.95rem; word-break: break-all;
        }
        .chat-footer {
            padding: 15px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px;
            background: rgba(0, 0, 0, 0.1); border-bottom-left-radius: 16px; border-bottom-right-radius: 16px;
        }
        .input-row { display: flex; gap: 8px; }
        .chat-input {
            flex: 1; background: #0f172a; border: 1px solid var(--border-color); border-radius: 8px;
            color: white; padding: 10px; font-size: 0.9rem;
        }
        .send-btn {
            background: var(--accent-blue); border: none; color: #0b0f19; font-weight: bold; padding: 0 16px; border-radius: 8px; cursor: pointer;
        }
        .room-badge { background: rgba(56, 189, 248, 0.15); color: var(--accent-blue); padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🔮 全民股神魔法學院</h2>
        <div class="user-info">
            <img src="/static/uploads/{{ user.avatar }}" class="user-avatar" onerror="this.src='/static/uploads/default_avatar.png'">
            <strong>{{ user.username }}</strong>
            <span style="color: #475569;">|</span>
            <a href="/logout" class="logout-btn">登出大廳</a>
        </div>
    </div>

    <div class="main-container">
        <div class="stock-main-panel">
            <div class="panel-title">
                <span>📊 台灣股市今日真實收盤行情 (靜態)</span>
                <button class="refresh-btn" onclick="window.location.reload();">🔄 整理數據</button>
            </div>
            <table class="stock-table">
                <thead>
                    <tr>
                        <th>股票代號 / 名稱</th>
                        <th style="text-align: right;">收盤價格</th>
                        <th style="text-align: right;">今日漲跌幅</th>
                        <th>魔法學院趨勢備忘錄</th>
                    </tr>
                </thead>
                <tbody>
                    {% for stock in stocks %}
                    <tr class="stock-row">
                        <td style="font-weight: 600;">{{ stock.name }}</td>
                        <td style="text-align: right; font-weight: 600;">{{ stock.price }}</td>
                        <td style="text-align: right; font-weight: bold; {% if stock.change >= 0 %}color: var(--up-red);{% else %}color: var(--down-green);{% endif %}">
                            {% if stock.change >= 0 %}▲{% else %}▼{% endif %} {{ stock.change | abs }}%
                        </td>
                        <td style="color: #94a3b8; font-size: 0.95rem; padding-left: 15px;">{{ stock.desc }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="chat-sidebar">
            <div class="chat-header">
                <div class="chat-title">💬 學院交流室 <span class="room-badge" id="current-room-name">大廳</span></div>
            </div>
            <div class="chat-body" id="chat-messages"></div>
            <div class="chat-footer">
                <div class="input-row">
                    <input type="text" id="room-input" class="chat-input" placeholder="輸入聊天室名稱..." style="width: 55%">
                    <button onclick="switchRoom()" class="send-btn" style="background: #475569; color: white;">切換房間</button>
                </div>
                <div class="input-row">
                    <input type="text" id="message-input" class="chat-input" placeholder="輸入密語交流...">
                    <button onclick="sendMessage()" class="send-btn">送出</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io({ transports: ['websocket', 'polling'] });
        let currentRoom = "大廳";

        socket.emit('join', { room: currentRoom });

        socket.on('chat_msg', function(data) {
            const chatBox = document.getElementById('chat-messages');
            if (!chatBox) return;
            const msgHtml = `
                <div class="msg-line">
                    <img src="/static/uploads/${data.avatar}" class="msg-avatar" onerror="this.src='/static/uploads/default_avatar.png'">
                    <div class="msg-bubble">
                        <span style="color: var(--accent-blue); font-weight: bold; font-size: 0.85rem; display:block; margin-bottom: 2px;">${data.username}</span>
                        <span>${data.msg}</span>
                    </div>
                </div>
            `;
            chatBox.innerHTML += msgHtml;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        function sendMessage() {
            const input = document.getElementById('message-input');
            if(input && input.value.trim()) {
                socket.emit('send_msg', { room: currentRoom, msg: input.value.trim() });
                input.value = '';
            }
        }

        function switchRoom() {
            const roomInput = document.getElementById('room-input');
            if(roomInput && roomInput.value.trim()) {
                const rName = roomInput.value.trim();
                if (rName !== currentRoom) {
                    currentRoom = rName;
                    document.getElementById('current-room-name').innerText = currentRoom;
                    document.getElementById('chat-messages').innerHTML = '';
                    socket.emit('join', { room: currentRoom });
                    roomInput.value = '';
                }
            }
        }

        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
