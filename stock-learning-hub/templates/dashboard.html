<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>📈 學院大廳 - 魔法股市主要看板</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --accent-blue: #38bdf8;
            --up-red: #f43f5e;
            --down-green: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* 頂部導航欄 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            flex-shrink: 0; /* 防止頂部被壓縮 */
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--accent-blue); }
        .logout-btn { color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .logout-btn:hover { color: var(--up-red); }

        /* 主佈局：防止內容被喀到，高度動態計算 */
        .main-container {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0; /* 關鍵：允許子元件正常縮放，不擠壓底部 */
            position: relative;
        }

        /* 主要面板：股市看板 */
        .stock-main-panel {
            flex: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 25px;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 股市表格樣式 */
        .stock-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .stock-table th {
            padding: 14px;
            color: #94a3b8;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }
        .stock-table td {
            padding: 16px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1.05rem;
        }
        .stock-row {
            transition: background 0.2s;
        }
        .stock-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* 右側側邊欄聊天室 */
        .chat-sidebar {
            width: 320px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, width 0.3s ease;
            flex-shrink: 0;
        }

        /* 聊天室收合狀態 */
        .chat-sidebar.collapsed {
            width: 60px;
            cursor: pointer;
        }
        .chat-sidebar.collapsed .chat-body,
        .chat-sidebar.collapsed .chat-footer,
        .chat-sidebar.collapsed .room-badge {
            display: none !important;
        }
        .chat-sidebar.collapsed .chat-header {
            writing-mode: vertical-lr;
            padding: 20px 0;
            height: 100%;
            justify-content: center;
            align-items: center;
            letter-spacing: 4px;
        }

        /* 聊天室內部組件 */
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.1);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            flex-shrink: 0;
        }
        .chat-title { font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .toggle-chat-btn {
            background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1.1rem;
        }
        .toggle-chat-btn:hover { color: var(--accent-blue); }

        .chat-body {
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
            min-height: 0;
        }
        .msg-line { display: flex; gap: 10px; align-items: flex-start; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: #475569; }
        .msg-bubble {
            background: rgba(15, 23, 42, 0.6); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-color);
            max-width: 80%; font-size: 0.95rem; word-break: break-all;
        }

        .chat-footer {
            padding: 15px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px;
            background: rgba(0, 0, 0, 0.1); border-bottom-left-radius: 16px; border-bottom-right-radius: 16px;
            flex-shrink: 0;
        }
        .input-row { display: flex; gap: 8px; }
        .chat-input {
            flex: 1; background: #0f172a; border: 1px solid var(--border-color); border-radius: 8px;
            color: white; padding: 10px; font-size: 0.9rem;
        }
        .send-btn {
            background: var(--accent-blue); border: none; color: #0b0f19; font-weight: bold;
            padding: 0 16px; border-radius: 8px; cursor: pointer;
        }

        .room-badge {
            background: rgba(56, 189, 248, 0.15); color: var(--accent-blue);
            padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🔮 全民股神魔法學院</h2>
        <div class="user-info">
            <img src="/static/uploads/{{ user.avatar }}" class="user-avatar" onerror="this.src='/static/uploads/default_avatar.png'">
            <strong>{{ user.username }}</strong>
            <span style="color: #475569;">|</span>
            <a href="/logout" class="logout-btn">登出大廳</a>
        </div>
    </div>

    <div class="main-container">
        
        <div class="stock-main-panel">
            <div class="panel-title">📊 台灣股市即時行情主面板</div>
            <table class="stock-table">
                <thead>
                    <tr>
                        <th>股票代號 / 名稱</th>
                        <th style="text-align: right;">即時價格</th>
                        <th style="text-align: right;">今日漲跌幅</th>
                        <th>魔法學院趨勢備忘錄</th>
                    </tr>
                </thead>
                <tbody id="stock-table-body">
                    <tr>
                        <td colspan="4" style="color: #64748b; text-align: center; padding: 40px;">動態連線中，正在引進即時股市數據...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="chat-sidebar" id="chatSidebar">
            <div class="chat-header" onclick="checkExpand(event)">
                <div class="chat-title">
                    💬 學院交流室 
                    <span class="room-badge" id="current-room-name">大廳</span>
                </div>
                <button class="toggle-chat-btn" id="toggleChatBtn" onclick="toggleChat(event)">＞</button>
            </div>
            
            <div class="chat-body" id="chat-messages">
                </div>
            
            <div class="chat-footer">
                <div class="input-row">
                    <input type="text" id="room-input" class="chat-input" placeholder="輸入聊天室名稱..." style="width: 55%">
                    <button onclick="switchRoom()" class="send-btn" style="background: #475569; color: white;">切換房間</button>
                </div>
                <div class="input-row">
                    <input type="text" id="message-input" class="chat-input" placeholder="輸入密語交流...">
                    <button onclick="sendMessage()" class="send-btn">送出</button>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io({
            transports: ['websocket', 'polling']
        });

        let currentRoom = "大廳";

        // 進入網頁自動加入大廳
        socket.emit('join', { room: currentRoom });

        // 側邊聊天室收合控制邏輯
        function toggleChat(e) {
            if(e) e.stopPropagation();
            const sidebar = document.getElementById('chatSidebar');
            const btn = document.getElementById('toggleChatBtn');
            
            if (sidebar.classList.contains('collapsed')) {
                sidebar.classList.remove('collapsed');
                btn.innerText = "＞";
            } else {
                sidebar.classList.add('collapsed');
                btn.innerText = "＜ 聊天室";
            }
        }

        function checkExpand(e) {
            const sidebar = document.getElementById('chatSidebar');
            if (sidebar.classList.contains('collapsed')) {
                toggleChat(e);
            }
        }

        // 🚀 修正：對齊後端傳入的股票列表渲染
        socket.on('market_update', function(stockList) {
            const tbody = document.getElementById('stock-table-body');
            if (!tbody) return;
            tbody.innerHTML = '';

            stockList.forEach(stock => {
                const isUp = stock.change >= 0;
                const sign = isUp ? '▲' : '▼';
                const colorStyle = isUp ? 'style="color: var(--up-red); font-weight:bold; text-align: right;"' : 'style="color: var(--down-green); font-weight:bold; text-align: right;"';
                
                const rowHtml = `
                    <tr class="stock-row">
                        <td style="font-weight: 600;">${stock.name}</td>
                        <td style="text-align: right; font-weight: 600;">${stock.price.toFixed(1)}</td>
                        <td ${colorStyle}>${sign} ${Math.abs(stock.change).toFixed(2)}%</td>
                        <td style="color: #94a3b8; font-size: 0.95rem; padding-left: 15px;">${stock.desc}</td>
                    </tr>
                `;
                tbody.innerHTML += rowHtml;
            });
        });

        // 接收聊天室訊息
        socket.on('chat_msg', function(data) {
            const chatBox = document.getElementById('chat-messages');
            if (!chatBox) return;
            const msgHtml = `
                <div class="msg-line">
                    <img src="/static/uploads/${data.avatar}" class="msg-avatar" onerror="this.src='/static/uploads/default_avatar.png'">
                    <div class="msg-bubble">
                        <span style="color: var(--accent-blue); font-weight: bold; font-size: 0.85rem; display:block; margin-bottom: 2px;">${data.username}</span>
                        <span>${data.msg}</span>
                    </div>
                </div>
            `;
            chatBox.innerHTML += msgHtml;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // 傳送聊天訊息
        function sendMessage() {
            const input = document.getElementById('message-input');
            if(input && input.value.trim()) {
                socket.emit('send_msg', { room: currentRoom, msg: input.value.trim() });
                input.value = '';
            }
        }

        // 切換聊天室
        function switchRoom() {
            const roomInput = document.getElementById('room-input');
            if(roomInput && roomInput.value.trim()) {
                const rName = roomInput.value.trim();
                if (rName !== currentRoom) {
                    currentRoom = rName;
                    document.getElementById('current-room-name').innerText = currentRoom;
                    document.getElementById('chat-messages').innerHTML = '';
                    socket.emit('join', { room: currentRoom });
                    roomInput.value = '';
                }
            }
        }

        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
